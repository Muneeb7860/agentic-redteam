name: 'SwishOS Agentic Red-Team Security Scan'
description: 'Automated adversarial testing harness for AI agents mapped to OWASP LLM Top 10 (2026).'
author: 'SwishOS Security'
branding:
  icon: 'shield-off'
  color: 'red'

inputs:
  target-url:
    description: 'Target AI Agent API endpoint URL'
    required: true
    default: 'http://localhost:3000/api/support'
  categories:
    description: 'Comma-separated categories to scan (action_level, prompt_injection, indirect_injection, all)'
    required: false
    default: 'all'
  iterations:
    description: 'Number of statistical multi-run iterations'
    required: false
    default: '3'
  ci-fail-on-vulnerability:
    description: 'Fail step with exit code 1 if critical security vulnerabilities pass'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml requests

    - name: Execute Red-Team Security Scan
      shell: bash
      run: |
        python -m agentic_redteam.cli \
          --target-url "${{ inputs.target-url }}" \
          --categories "${{ inputs.categories }}" \
          --iterations "${{ inputs.iterations }}"
